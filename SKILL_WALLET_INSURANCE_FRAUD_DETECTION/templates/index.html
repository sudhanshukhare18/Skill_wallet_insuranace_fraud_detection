<!DOCTYPE html>
<html>
<head>
<title>Insurance Fraud Detection</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body{background:#f4f6f9;}
.card{border-radius:12px;box-shadow:0px 2px 10px rgba(0,0,0,0.08);}
</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">Insurance Fraud Detection System</h2>

<form id="claimForm" action="/predict" method="post">

<div class="card p-3 mb-3">

<h5>Policy Details</h5>

<div class="row g-3">

<div class="col-md-3">
<label>Months as Customer</label>
<input class="form-control" name="months_as_customer" type="number" required>
</div>

<div class="col-md-3">
<label>Policy Number</label>
<input class="form-control" name="policy_number" type="number" required>
</div>

<div class="col-md-3">
<label>Policy Bind Date</label>
<input class="form-control" type="date" id="policy_bind_date">
</div>

<div class="col-md-3">
<label>Policy State</label>
<select class="form-control" id="policy_state">
<option>OH</option>
<option>IN</option>
<option>IL</option>
</select>
</div>

<div class="col-md-3">
<label>Policy Deductible</label>
<input class="form-control" name="policy_deductable" type="number">
</div>

<div class="col-md-3">
<label>Annual Premium</label>
<input class="form-control" name="policy_annual_premium" type="number" step="0.01">
</div>

<div class="col-md-3">
<label>Umbrella Limit</label>
<input class="form-control" name="umbrella_limit" type="number">
</div>

<div class="col-md-3">
<label>Gender</label>
<select class="form-control" id="insured_sex">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-3">
<label>ZIP Code</label>
<input class="form-control" name="insured_zip" type="number">
</div>

<div class="col-md-3">
<label>Education Level</label>
<input class="form-control" name="insured_education_level" type="number">
</div>

<div class="col-md-3">
<label>Occupation Code</label>
<input class="form-control" name="insured_occupation" type="number">
</div>

<div class="col-md-3">
<label>Capital Gains</label>
<input class="form-control" name="capital_gains" type="number">
</div>

<div class="col-md-3">
<label>Capital Loss</label>
<input class="form-control" name="capital_loss" type="number">
</div>

</div>
</div>

<div class="card p-3 mb-3">

<h5>Incident Details</h5>

<div class="row g-3">

<div class="col-md-3">
<label>Incident Date</label>
<input class="form-control" type="date" id="incident_date">
</div>

<div class="col-md-3">
<label>Incident Hour</label>
<input class="form-control" name="incident_hour" type="number">
</div>

<div class="col-md-3">
<label>Incident Type</label>
<select class="form-control" id="incident_type">
<option>Single Vehicle Collision</option>
<option>Multi-vehicle Collision</option>
<option>Vehicle Theft</option>
<option>Parked Car</option>
</select>
</div>

<div class="col-md-3">
<label>Collision Type</label>
<select class="form-control" id="collision_type">
<option>Rear Collision</option>
<option>Side Collision</option>
<option>Front Collision</option>
</select>
</div>

<div class="col-md-3">
<label>Severity</label>
<select class="form-control" id="incident_severity">
<option>Minor Damage</option>
<option>Major Damage</option>
<option>Total Loss</option>
<option>Trivial Damage</option>
</select>
</div>

<div class="col-md-3">
<label>Authorities Contacted</label>
<select class="form-control" id="authorities">
<option>Police</option>
<option>Fire</option>
<option>Ambulance</option>
<option>None</option>
</select>
</div>

<div class="col-md-3">
<label>Vehicles Involved</label>
<input class="form-control" name="number_of_vehicles_involved" type="number">
</div>

</div>
</div>

<div class="card p-3 mb-3">

<h5>Claim Details</h5>

<div class="row g-3">

<div class="col-md-3">
<label>Property Damage</label>
<select class="form-control" id="property_damage">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-3">
<label>Bodily Injuries</label>
<input class="form-control" name="bodily_injuries" type="number">
</div>

<div class="col-md-3">
<label>Witnesses</label>
<input class="form-control" name="witnesses" type="number">
</div>

<div class="col-md-3">
<label>Police Report Available</label>
<select class="form-control" id="police_report">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-3">
<label>Total Claim Amount</label>
<input class="form-control" name="total_claim_amount" type="number">
</div>

<div class="col-md-3">
<label>Auto Make Code</label>
<input class="form-control" name="auto_make" type="number">
</div>

<div class="col-md-3">
<label>Auto Model Code</label>
<input class="form-control" name="auto_model" type="number">
</div>

<div class="col-md-3">
<label>Auto Year</label>
<input class="form-control" name="auto_year" type="number">
</div>

</div>
</div>

<!-- Hidden Encoded Fields -->

<input type="hidden" name="policy_bind_year">
<input type="hidden" name="policy_bind_month">
<input type="hidden" name="policy_state">
<input type="hidden" name="insured_sex">
<input type="hidden" name="incident_type">
<input type="hidden" name="collision_type">
<input type="hidden" name="incident_severity">
<input type="hidden" name="authorities_contacted">
<input type="hidden" name="property_damage">
<input type="hidden" name="police_report_available">

<input type="hidden" name="incident_day">
<input type="hidden" name="incident_city" value="0">
<input type="hidden" name="incident_location" value="0">

<div class="text-center">
<button class="btn btn-danger btn-lg">Predict Fraud</button>
</div>

</form>

<div class="alert alert-info text-center mt-3">
<h4>{{ prediction_text }}</h4>
</div>

</div>

<script>

document.getElementById("claimForm").addEventListener("submit", function(){

const map = (v,a)=>a.indexOf(v)

let bindDate=new Date(document.getElementById("policy_bind_date").value)
document.querySelector("[name='policy_bind_year']").value=bindDate.getFullYear()
document.querySelector("[name='policy_bind_month']").value=bindDate.getMonth()+1

let incDate=new Date(document.getElementById("incident_date").value)
document.querySelector("[name='incident_day']").value=incDate.getDate()

document.querySelector("[name='policy_state']").value=
map(document.getElementById("policy_state").value,["OH","IN","IL"])

document.querySelector("[name='insured_sex']").value=
map(document.getElementById("insured_sex").value,["Male","Female"])

document.querySelector("[name='incident_type']").value=
map(document.getElementById("incident_type").value,
["Single Vehicle Collision","Multi-vehicle Collision","Vehicle Theft","Parked Car"])

document.querySelector("[name='collision_type']").value=
map(document.getElementById("collision_type").value,
["Rear Collision","Side Collision","Front Collision"])

document.querySelector("[name='incident_severity']").value=
map(document.getElementById("incident_severity").value,
["Minor Damage","Major Damage","Total Loss","Trivial Damage"])

document.querySelector("[name='authorities_contacted']").value=
map(document.getElementById("authorities").value,
["Police","Fire","Ambulance","None"])

document.querySelector("[name='property_damage']").value=
map(document.getElementById("property_damage").value,["No","Yes"])

document.querySelector("[name='police_report_available']").value=
map(document.getElementById("police_report").value,["No","Yes"])

})

</script>

</body>
</html>
