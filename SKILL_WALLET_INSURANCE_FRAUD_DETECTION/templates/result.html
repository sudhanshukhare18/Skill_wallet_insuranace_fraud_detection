<!DOCTYPE html>
<html>
<head>

<title>Prediction Result</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
}

.card{
margin-top:100px;
padding:40px;
border-radius:12px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card text-center">

<h2>Fraud Detection Result</h2>

<br>

{% if prediction_text == "Fraud Detected" %}

<h3 class="text-danger">⚠ Fraudulent Claim</h3>

{% else %}

<h3 class="text-success">✔ Legitimate Claim</h3>

{% endif %}

<br>

<h4>{{ prediction_text }}</h4>

<br>

<a href="/" class="btn btn-primary">Check Another Claim</a>

</div>

</div>

</div>

</div>

</body>
</html>
